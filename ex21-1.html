<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Functional Components</title>
  </head>
  <body>
    <!-- Root element -->
    <div id="root"></div>

    <!-- React Library & React DOM-->
    <script src="https://unpkg.com/react@16/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.development.js"></script>

    <script type="module">
      /**
       * ch04/ex/ex21-1.html
       * function components, without parameters, react@16
       * ref: ch04/03/01-2-functions.html
       */

      const address = [
        "Division of Computer Engineering",
        "Hansung University",
        "116",
        "Samseongyo-ro",
        "16-gil",
        "Seongbuk-gu",
        "Seoul",
        "02876",
        "South Korea",
      ];

      // 실습21-1: 함수형 컴포넌트 정의 (함수 선언문)
      const Address = function () {
        return React.createElement(
          "section",
          { id: "address" },
          React.createElement(
            "ul",
            { className: "contents" },
            address.map((element, i) =>
              React.createElement("li", { key: i }, element)
            )
          )
        );
      };

      // root 엘리먼트에 Address 컴포넌트를 렌더링 (react@16)
      ReactDOM.render(
        React.createElement(Address, null, null),
        document.getElementById("root")
      );

      console.log("Address:", Address());
    </script>
  </body>
</html>
